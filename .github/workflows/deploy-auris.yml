name: Deploy AurisTraining

on:
  push:
    branches:
      - main
    paths:
      - backend/**
      - frontend/**
      - manuel/**
      - Dockerfile
      - .dockerignore
      - .github/workflows/deploy-auris.yml
  workflow_dispatch:

concurrency:
  group: deploy-auris-training
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          AURIS_SSH_HOST: ${{ secrets.AURIS_SSH_HOST }}
          AURIS_SSH_USER: ${{ secrets.AURIS_SSH_USER }}
          AURIS_SSH_PRIVATE_KEY: ${{ secrets.AURIS_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          [ -n "${AURIS_SSH_HOST}" ] || { echo "Missing secret: AURIS_SSH_HOST"; exit 1; }
          [ -n "${AURIS_SSH_USER}" ] || { echo "Missing secret: AURIS_SSH_USER"; exit 1; }
          [ -n "${AURIS_SSH_PRIVATE_KEY}" ] || { echo "Missing secret: AURIS_SSH_PRIVATE_KEY"; exit 1; }

      - name: Prepare SSH
        env:
          AURIS_SSH_HOST: ${{ secrets.AURIS_SSH_HOST }}
          AURIS_SSH_PORT: ${{ secrets.AURIS_SSH_PORT }}
          AURIS_SSH_PRIVATE_KEY: ${{ secrets.AURIS_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          PORT="${AURIS_SSH_PORT:-22}"
          mkdir -p "$HOME/.ssh"
          printf "%s\n" "${AURIS_SSH_PRIVATE_KEY}" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          ssh-keyscan -p "$PORT" -H "$AURIS_SSH_HOST" >> "$HOME/.ssh/known_hosts"

      - name: Create deploy archive
        run: |
          set -euo pipefail
          ARCHIVE="auris-deploy-${GITHUB_SHA::12}.tgz"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
          tar -czf "$ARCHIVE" \
            --exclude=".git" \
            --exclude=".github" \
            --exclude=".vscode" \
            --exclude="backend/.venv" \
            --exclude="backend/venv" \
            --exclude="frontend/node_modules" \
            --exclude="frontend/dist" \
            --exclude="**/__pycache__" \
            --exclude="**/*.pyc" \
            backend frontend manuel Dockerfile .dockerignore README.md

      - name: Upload and deploy
        env:
          AURIS_SSH_HOST: ${{ secrets.AURIS_SSH_HOST }}
          AURIS_SSH_USER: ${{ secrets.AURIS_SSH_USER }}
          AURIS_SSH_PORT: ${{ secrets.AURIS_SSH_PORT }}
          AURIS_REMOTE_DIR: ${{ secrets.AURIS_REMOTE_DIR }}
          AURIS_CONTAINER_NAME: ${{ secrets.AURIS_CONTAINER_NAME }}
          AURIS_IMAGE_NAME: ${{ secrets.AURIS_IMAGE_NAME }}
          AURIS_API_URL: ${{ secrets.AURIS_API_URL }}
        run: |
          set -euo pipefail
          PORT="${AURIS_SSH_PORT:-22}"
          REMOTE_DIR="${AURIS_REMOTE_DIR:-/home/lakhdar/auris-training}"
          CONTAINER_NAME="${AURIS_CONTAINER_NAME:-auris-training}"
          IMAGE_NAME="${AURIS_IMAGE_NAME:-auris-training:prod}"
          API_URL="${AURIS_API_URL:-/api}"
          REMOTE_ARCHIVE="/tmp/${ARCHIVE}"

          case "$REMOTE_DIR" in
            *auris-training*) ;;
            *)
              echo "Refusing deploy: REMOTE_DIR must contain 'auris-training'."
              exit 1
              ;;
          esac

          scp -P "$PORT" "$ARCHIVE" "${AURIS_SSH_USER}@${AURIS_SSH_HOST}:${REMOTE_ARCHIVE}"

          ssh -p "$PORT" "${AURIS_SSH_USER}@${AURIS_SSH_HOST}" \
            "REMOTE_DIR='$REMOTE_DIR' CONTAINER_NAME='$CONTAINER_NAME' IMAGE_NAME='$IMAGE_NAME' API_URL='$API_URL' REMOTE_ARCHIVE='$REMOTE_ARCHIVE' bash -s" <<'EOF'
          set -euo pipefail

          mkdir -p "$REMOTE_DIR"
          tar -xzf "$REMOTE_ARCHIVE" -C "$REMOTE_DIR"
          cd "$REMOTE_DIR"

          if [ ! -f "$REMOTE_DIR/.env.prod" ]; then
            echo ".env.prod missing on server"
            exit 1
          fi

          docker build --build-arg "VITE_API_URL=$API_URL" -t "$IMAGE_NAME" .
          docker rm -f "$CONTAINER_NAME" >/dev/null 2>&1 || true
          docker run -d --name "$CONTAINER_NAME" --restart unless-stopped \
            --env-file "$REMOTE_DIR/.env.prod" \
            -p 127.0.0.1:5002:5002 \
            "$IMAGE_NAME"

          health_ok=0
          for i in $(seq 1 120); do
            if curl -fsS http://127.0.0.1:5002/api/health >/dev/null; then
              health_ok=1
              break
            fi

            if ! docker ps --format '{{.Names}}' | grep -q "^$CONTAINER_NAME$"; then
              echo "container-not-running"
              docker ps -a --filter "name=$CONTAINER_NAME"
              docker logs --tail 200 "$CONTAINER_NAME" || true
              exit 1
            fi

            sleep 2
          done

          if [ "$health_ok" -ne 1 ]; then
            echo "health-check-failed"
            docker logs --tail 200 "$CONTAINER_NAME" || true
            exit 1
          fi

          rm -f "$REMOTE_ARCHIVE"
          echo "deploy-ok"
          EOF

      - name: Cleanup local archive
        if: always()
        run: rm -f "${ARCHIVE:-}"
